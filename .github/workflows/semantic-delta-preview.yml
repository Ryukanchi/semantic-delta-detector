name: Semantic Delta Preview

on:
  workflow_dispatch:
  pull_request:

jobs:
  preview:
    name: Run Semantic Delta preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm run build

      # Preview only: this prints the PR-style Semantic Delta output in CI logs.
      # It does not call the GitHub API, comment on PRs, or fail builds based on semantic risk yet.
      - name: Preview PR-style semantic delta comment
        run: pnpm run compare -- --before ./examples/pr-before.sql --after ./examples/pr-after.sql --pr
