name: Semantic Delta Preview

on:
  workflow_dispatch:
    inputs:
      before_path:
        description: "Path to the before SQL file"
        required: false
        default: "./examples/pr-before.sql"
      after_path:
        description: "Path to the after SQL file"
        required: false
        default: "./examples/pr-after.sql"
      fail_on:
        description: "Optional risk threshold that fails the workflow"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - low
          - medium
          - high
          - critical
  pull_request:

jobs:
  preview:
    name: Run Semantic Delta preview
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm run build

      # Preview only: this prints the PR-style Semantic Delta output in CI logs.
      # It does not call the GitHub API or comment on PRs.
      # Pull requests remain non-blocking; manual runs can opt into --fail-on.
      - name: Preview PR-style semantic delta comment
        env:
          BEFORE_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.before_path || './examples/pr-before.sql' }}
          AFTER_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.after_path || './examples/pr-after.sql' }}
          FAIL_ON: ${{ github.event_name == 'workflow_dispatch' && inputs.fail_on || 'none' }}
        run: |
          echo "Comparing before SQL: $BEFORE_PATH"
          echo "Comparing after SQL: $AFTER_PATH"

          if [ -z "$FAIL_ON" ] || [ "$FAIL_ON" = "none" ]; then
            pnpm run compare -- --before "$BEFORE_PATH" --after "$AFTER_PATH" --pr
          else
            pnpm run compare -- --before "$BEFORE_PATH" --after "$AFTER_PATH" --pr --fail-on "$FAIL_ON"
          fi
